<svg width="680" viewBox="0 0 680 1160" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TITLE -->
<text font-size="15" font-weight="500" fill="#1a1a18" x="340" y="30" text-anchor="middle">CCM v1 — Cognitive Coherence Model</text>
<text font-size="12" fill="#73726c" x="340" y="48" text-anchor="middle">Architecture map · Akimsa3</text>

<!-- INPUT -->
<rect x="240" y="62" width="200" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="87" text-anchor="middle">Variable input</text>
<line x1="340" y1="102" x2="340" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- PRE-INPUT -->
<rect x="210" y="120" width="260" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#26215C" x="340" y="140" text-anchor="middle">pre_input</text>
<text font-size="12" fill="#3C3489" x="340" y="158" text-anchor="middle">concepts · focus · semantic vector</text>

<!-- fork arrows -->
<line x1="260" y1="172" x2="175" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="172" x2="505" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- SOMATIC ENGINE -->
<rect x="60" y="210" width="230" height="56" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#4A1B0C" x="175" y="232" text-anchor="middle">Somatic engine</text>
<text font-size="12" fill="#712B13" x="175" y="250" text-anchor="middle">V · I · Lv · Gv  ·  range 0–400</text>

<!-- MENTAL ENGINE -->
<rect x="390" y="210" width="230" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#04342C" x="505" y="232" text-anchor="middle">Mental engine</text>
<text font-size="12" fill="#085041" x="505" y="250" text-anchor="middle">P · A · Er · Rr  ·  range 0–200</text>

<!-- rhombus center -->
<text font-size="11" fill="#73726c" x="340" y="222" text-anchor="middle">rhombus</text>
<polygon points="340,228 355,242 340,256 325,242" fill="none" stroke="#888780" stroke-width="1"/>
<text font-size="10" fill="#5F5E5A" x="340" y="272" text-anchor="middle">V / P</text>
<text font-size="10" fill="#5F5E5A" x="308" y="246" text-anchor="middle">Gv / Rr</text>
<text font-size="10" fill="#5F5E5A" x="372" y="246" text-anchor="middle">Lv / Er</text>
<text font-size="10" fill="#5F5E5A" x="340" y="288" text-anchor="middle">I / A</text>

<!-- arrows down to PING -->
<line x1="175" y1="266" x2="175" y2="296" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="505" y1="266" x2="505" y2="296" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- PING 1 SOMATIC -->
<rect x="60" y="296" width="230" height="68" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#4A1B0C" x="175" y="316" text-anchor="middle">Ping 1 — Somatic</text>
<text font-size="12" fill="#712B13" x="175" y="334" text-anchor="middle">apply_external(vec_s)</text>
<text font-size="12" fill="#712B13" x="175" y="352" text-anchor="middle">D1 = center of mass</text>

<!-- PING 2 MENTAL -->
<rect x="390" y="296" width="230" height="68" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#04342C" x="505" y="316" text-anchor="middle">Ping 2 — Mental</text>
<text font-size="12" fill="#085041" x="505" y="334" text-anchor="middle">apply_external(vec_m)</text>
<text font-size="12" fill="#085041" x="505" y="352" text-anchor="middle">C1 = center of mass</text>

<!-- cross D1 → mental -->
<path d="M290 330 L390 330" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-size="11" fill="#5F5E5A" x="340" y="323" text-anchor="middle">cross D1 →</text>

<line x1="175" y1="364" x2="175" y2="392" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="505" y1="364" x2="505" y2="392" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- PONG SOMATIC -->
<rect x="60" y="392" width="230" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#4A1B0C" x="175" y="414" text-anchor="middle">Pong — Somatic</text>
<text font-size="12" fill="#712B13" x="175" y="432" text-anchor="middle">recalibrate(C1) → D2</text>

<!-- PING FINAL MENTAL -->
<rect x="390" y="392" width="230" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#04342C" x="505" y="414" text-anchor="middle">Ping final — Mental</text>
<text font-size="12" fill="#085041" x="505" y="432" text-anchor="middle">recalibrate(D2) → C2</text>

<!-- cross C1 / D2 -->
<path d="M390 418 L290 418" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-size="11" fill="#5F5E5A" x="340" y="411" text-anchor="middle">← cross C1</text>
<path d="M290 444 L390 444" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-size="11" fill="#5F5E5A" x="340" y="437" text-anchor="middle">cross D2 →</text>

<line x1="175" y1="448" x2="175" y2="476" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="505" y1="448" x2="505" y2="476" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Df / Cf final -->
<rect x="60" y="476" width="230" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="1"/>
<text font-size="14" font-weight="500" fill="#4A1B0C" x="175" y="498" text-anchor="middle">Df — Final impact ★</text>
<text font-size="12" fill="#712B13" x="175" y="516" text-anchor="middle">D1 × 0.75  ·  cx, cy</text>

<rect x="390" y="476" width="230" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text font-size="14" font-weight="500" fill="#04342C" x="505" y="498" text-anchor="middle">Cf — Final impact ★</text>
<text font-size="12" fill="#085041" x="505" y="516" text-anchor="middle">C1 × 0.75  ·  cx, cy</text>

<text font-size="11" fill="#5F5E5A" x="340" y="496" text-anchor="middle">larger dist.</text>
<text font-size="11" fill="#5F5E5A" x="340" y="512" text-anchor="middle">→ dominates</text>

<!-- merge lines → GDE -->
<line x1="175" y1="532" x2="175" y2="558" stroke="#888780" stroke-width="1.5"/>
<line x1="505" y1="532" x2="505" y2="558" stroke="#888780" stroke-width="1.5"/>
<line x1="175" y1="558" x2="340" y2="558" stroke="#888780" stroke-width="1.5"/>
<line x1="505" y1="558" x2="340" y2="558" stroke="#888780" stroke-width="1.5"/>
<line x1="340" y1="558" x2="340" y2="574" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- GDE BOX -->
<rect x="100" y="574" width="480" height="90" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text font-size="14" font-weight="500" fill="#26215C" x="340" y="596" text-anchor="middle">Geometric Decision Engine (GDE)</text>
<text font-size="12" fill="#3C3489" x="200" y="618" text-anchor="middle">V1 — primary centroid</text>
<text font-size="12" fill="#3C3489" x="340" y="618" text-anchor="middle">V2 — coherence centroid</text>
<text font-size="12" fill="#3C3489" x="480" y="618" text-anchor="middle">V3 — bezier curvature ✦</text>
<text font-size="11" fill="#534AB7" x="200" y="638" text-anchor="middle">quadrant + flag</text>
<text font-size="11" fill="#534AB7" x="340" y="638" text-anchor="middle">spheroid / star shape</text>
<text font-size="11" fill="#534AB7" x="480" y="638" text-anchor="middle">K = D_max − D  (planned)</text>

<line x1="340" y1="664" x2="340" y2="682" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- MUSCLE TONE -->
<rect x="120" y="682" width="440" height="64" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
<text font-size="14" font-weight="500" fill="#412402" x="340" y="704" text-anchor="middle">Muscle Tone System</text>
<text font-size="12" fill="#633806" x="340" y="724" text-anchor="middle">Lv / Er → tension  ·  Gv / Rr → relaxation</text>
<text font-size="12" fill="#633806" x="340" y="738" text-anchor="middle">dominant engine → muscle_tension → core_system (% MVC)</text>

<line x1="340" y1="746" x2="340" y2="764" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- PROCESSING MODE -->
<rect x="120" y="764" width="440" height="80" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="1.5"/>
<text font-size="14" font-weight="500" fill="#042C53" x="340" y="786" text-anchor="middle">Processing Mode System</text>
<text font-size="12" fill="#0C447C" x="340" y="806" text-anchor="middle">cfx &gt; 0 → Emotional  ·  cfx &lt; 0 → Rational  ·  |cfx| &lt; 5 → Balanced</text>
<text font-size="12" fill="#0C447C" x="340" y="824" text-anchor="middle">inference_depth 0–8  ·  modulates phrase_builder</text>

<text font-size="11" fill="#5F5E5A" x="128" y="854" text-anchor="start">Emotional: low→"I don't like this."  ·  med→"Stop that."  ·  high→"No!"  ·  critical→[preverbal]</text>
<text font-size="11" fill="#5F5E5A" x="128" y="870" text-anchor="start">Rational:  low→simple observation  ·  med→+1 inference  ·  high→+multi  ·  critical→chain</text>

<line x1="340" y1="874" x2="340" y2="892" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OUTPUT -->
<rect x="90" y="892" width="500" height="76" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="914" text-anchor="middle">Output layer</text>
<text font-size="12" fill="#5F5E5A" x="200" y="935" text-anchor="middle">verbal somatic</text>
<text font-size="12" fill="#5F5E5A" x="340" y="935" text-anchor="middle">verbal mental</text>
<text font-size="12" fill="#5F5E5A" x="480" y="935" text-anchor="middle">muscle_tension % MVC</text>
<text font-size="11" fill="#888780" x="200" y="953" text-anchor="middle">instinctive / reactive</text>
<text font-size="11" fill="#888780" x="340" y="953" text-anchor="middle">phrase_builder</text>
<text font-size="11" fill="#888780" x="480" y="953" text-anchor="middle">→ core_system</text>

<!-- QUADRANTS -->
<rect x="90" y="990" width="230" height="100" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#2C2C2A" x="205" y="1008" text-anchor="middle">Quadrants (V1)</text>
<line x1="205" y1="1014" x2="205" y2="1084" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="96" y1="1046" x2="314" y2="1046" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="11" fill="#5F5E5A" x="150" y="1034" text-anchor="middle">viable-local</text>
<text font-size="11" fill="#5F5E5A" x="262" y="1034" text-anchor="middle">viable-global</text>
<text font-size="11" fill="#5F5E5A" x="150" y="1066" text-anchor="middle">inviable-local</text>
<text font-size="11" fill="#5F5E5A" x="262" y="1066" text-anchor="middle">inviable-global</text>
<text font-size="11" fill="#888780" x="205" y="1084" text-anchor="middle">V1y ↕  V1x ↔</text>

<!-- 3 IMPACT LEVELS -->
<rect x="360" y="990" width="230" height="100" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#2C2C2A" x="475" y="1008" text-anchor="middle">3 impact levels</text>
<text font-size="12" fill="#5F5E5A" x="475" y="1030" text-anchor="middle">D1 / C1 — direct impact</text>
<text font-size="12" fill="#5F5E5A" x="475" y="1050" text-anchor="middle">D2 / C2 — relational impact</text>
<text font-size="12" fill="#5F5E5A" x="475" y="1070" text-anchor="middle">Df / Cf  — final impact ★</text>
<text font-size="11" fill="#888780" x="475" y="1086" text-anchor="middle">Df = D1 × 0.75</text>

<!-- footer -->
<line x1="60" y1="1104" x2="620" y2="1104" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="11" fill="#888780" x="340" y="1118" text-anchor="middle">CCM v1 · GDE V1/V2/V3 · processing mode · muscle tone · Akimsa3 · 2026</text>
<text font-size="11" fill="#888780" x="340" y="1134" text-anchor="middle">✦ V3 planned — not yet implemented</text>

</svg>
